# Queries
type Query {
  health: Health
  
  empresas: [Empresa]
  empresa(id: ID!): Empresa
  
  parametros_empresa: ParametrosEmpresa
  
  colaboradores: [Colaborador]
  colaborador(id: ID!): Colaborador
  colaboradores_com_departamentos: [ColaboradorCompleto]
  
  permissoes: [Permissao]
  
  departamentos: [Departamento]
  
  status(tipo_entidade: TipoEntidade): [Status]
  status_by_id(id: ID!): Status
  
  leads: [Lead]
  lead(id: ID!): Lead
  
  clientes: [Cliente]
  cliente(id: ID!): Cliente
  
  produtos: [Produto]
  produto(id: ID!): Produto
  
  orcamentos: [Orcamento]
  orcamento(id: ID!): Orcamento
  
  pedidos: [Pedido]
  pedido(id: ID!): Pedido
  
  contratos: [Contrato]
  contrato(id: ID!): Contrato
  
  faturas(contrato_id: ID): [Fatura]
  fatura(id: ID!): Fatura
  
  implantacoes: [Implantacao]
  implantacao(id: ID!): Implantacao
  
  templates(tipo_template: TipoTemplate): [Template]
  template(id: ID!): Template
  
  email_templates(tipo_documento: String): [EmailTemplate]
  email_template(id: ID!): EmailTemplate
  
  gerarOrcamentoTxt(id: ID!): OrcamentoTxt
  
  transacoes: [Transacao]
}

# Mutations
type Mutation {
  login(input: LoginInput!): AuthPayload
  
  createEmpresa(input: CreateEmpresaInput!): Empresa
  updateEmpresa(id: ID!, input: UpdateEmpresaInput!): Empresa
  deleteEmpresa(id: ID!): Boolean
  
  updateParametrosEmpresa(input: UpdateParametrosEmpresaInput!): ParametrosEmpresa
  
  createLead(input: CreateLeadInput!): Lead
  updateLead(id: ID!, input: UpdateLeadInput!): Lead
  deleteLead(id: ID!): Boolean
  
  createCliente(input: CreateClienteInput!): Cliente
  updateCliente(id: ID!, input: UpdateClienteInput!): Cliente
  deleteCliente(id: ID!): Boolean
  
  createProduto(input: CreateProdutoInput!): Produto
  updateProduto(id: ID!, input: UpdateProdutoInput!): Produto
  deleteProduto(id: ID!): Boolean
  
  createColaborador(input: CreateColaboradorInput!): Colaborador
  updateColaborador(id: ID!, input: UpdateColaboradorInput!): Colaborador
  deleteColaborador(id: ID!): Boolean
  
  createOrcamento(input: CreateOrcamentoInput!): Orcamento
  updateOrcamento(id: ID!, input: UpdateOrcamentoInput!): Orcamento
  deleteOrcamento(id: ID!): Boolean
  
  enviarOrcamentoEmail(input: EnviarEmailInput!): EnvioEmailResult
  enviarOrcamentoWhatsapp(input: EnviarWhatsappInput!): EnvioWhatsappResult
  
  createPedido(input: CreatePedidoInput!): Pedido
  updatePedido(id: ID!, input: UpdatePedidoInput!): Pedido
  deletePedido(id: ID!): Boolean
  
  createContrato(input: CreateContratoInput!): Contrato
  updateContrato(id: ID!, input: UpdateContratoInput!): Contrato
  deleteContrato(id: ID!): Boolean
  
  createFatura(input: CreateFaturaInput!): Fatura
  updateFatura(id: ID!, input: UpdateFaturaInput!): Fatura
  deleteFatura(id: ID!): Boolean
  
  createImplantacao(input: CreateImplantacaoInput!): Implantacao
  updateImplantacao(id: ID!, input: UpdateImplantacaoInput!): Implantacao
  deleteImplantacao(id: ID!): Boolean
  
  createTransacao(input: CreateTransacaoInput!): Transacao
  updateTransacao(id: ID!, input: UpdateTransacaoInput!): Transacao
  deleteTransacao(id: ID!): Boolean
}

