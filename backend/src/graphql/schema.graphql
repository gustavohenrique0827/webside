# GraphQL Schema for Webside ERP - CRM/CPM/Mensageria Complete
# Fixed schema validation errors

scalar DateTime
scalar Date
scalar JSON

# Enums from migration
enum TipoEndereco {
  Filial
  Lead
  Cliente
  Colaborador
  GrupoEconomico
}

enum TipoColaborador {
  Funcionario
  Comissionado
}

enum StatusPagamento {
  Pendente
  Pago
  Cancelado
}

enum CanalMensagem {
  email
  whatsapp
  notificacao_interna
}

enum TipoEnvio {
  imediato
  agendado
  recorrente
}

enum StatusEnvio {
  pendente
  em_execucao
  concluido
  cancelado
  erro
}

enum TipoPrioridadeTarefa {
  baixa
  media
  alta
}

enum TipoScriptAtivacao {
  scheduler
  gatilho_banco
}

# Core Organizational Types
