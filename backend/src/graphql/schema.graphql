type Query {
  clientes: [Cliente!]!
  filiais: [Filial!]!
  leads: [Lead!]!
  orcamentos(first: Int = 10, skip: Int = 0, status: String, clienteId: ID): [Orcamento!]!
  tarefas: [Tarefa!]!
  pipeline: [PipelineItem!]!
  colaborador(id: ID!): Colaborador
  me: User
  testConn: TestConn!
}

type Tarefa {
  id_tarefa: ID!
  titulo: String!
  descricao: String
  status: String!
  status_nome: String!
  responsavel_id: ID
  responsavel_nome: String!
  prazo: String
  data_criacao: String!
  prioridade: String
  id_orcamento: ID
}

type PipelineItem {
  etapa: String!
  count: Int!
  valor_total: Float!
  orcamentos: [Orcamento!]!
}

type Mutation {
  login(input: LoginInput!): AuthPayload!
  createCliente(input: ClienteInput!): Cliente!
  createOrcamento(input: OrcamentoInput!): Orcamento!
  createLead(input: LeadInput!): Lead!
}

input OrcamentoInput {
  cliente_id: ID!
  valor_total: Float!
  id_filial: ID!
  id_colaborador: ID!
  validade: String
}

input LoginInput {
  email: String!
  senha: String!
}

type Cliente {
  id_cliente: ID!
  nome: String!
  email: String
  telefone: String
  id_grupo: ID!
}


type Orcamento {
  id_orcamento: ID!
  cliente_id: ID!
  valor: Float!
  status: String!
}

type User {
  id: ID!
  email: String!
  nome: String!
  perfil: String!
}

type AuthPayload {
  token: String!
  user: User!
}

input ClienteInput {
  nome: String!
  email: String
  telefone: String
  id_grupo: ID!
  id_filial: ID
}

type TestConn {
  tables: Int!
  clientes: Int!
  orcamentos: Int!
}

type Filial {
  id_filial: ID!
  cnpj: String!
  razao_social: String!
  nome_fantasia: String
  telefone: String
  whatsapp: String
  email: String
  base_sm: Float!
  ativo: Boolean!
}

type Colaborador {
  id_colaborador: ID!
  nome: String!
  email: String!
  cargo: String
  ativo: Boolean!
}

type Lead {
  id_lead: ID!
  nome: String!
  email: String
  telefone: String
}

input LeadInput {
  nome: String!
  email: String
  telefone: String
}
