# Queries - Complete coverage
type Query {
  # Health
  health: Health
  empresas: [Cliente]
  empresa(id: ID!): Cliente
  parametros_empresa: ParametrosEmpresa
  permissoes: [Permissao]
  # departamentos: [DepartamentoLegacy]  # REMOVED DUPLICATE
  colaboradores_com_departamentos: [Colaborador]
  
  # Organizational
  filiais(id_filial: ID): [Filial]
  filial(id: ID!): Filial
  departamentos(id_filial: ID): [Departamento]
  departamento(id: ID!): Departamento
  colaboradores(id_filial: ID): [Colaborador]
  colaborador(id: ID!): Colaborador
  perfisAcesso: [PerfilAcesso]
  funcoesSistema: [FuncaoSistema]
  
  # CRM
  grupoEconomicos: [GrupoEconomico]
  leads(id_filial: ID): [Lead]
  lead(id: ID!): Lead
  leadLogsConsulta(id_lead: ID!): [LeadLogConsultaEndereco]
  clientes(id_filial: ID): [Cliente]
  cliente(id: ID!): Cliente
  
  # Commercial
  grupoProdutos: [GrupoProduto]
  produtos(id_grupo: ID): [Produto]
  orcamentos(id_filial: ID): [Orcamento]
  orcamento(id: ID!): Orcamento
  pedidos(id_filial: ID): [Pedido]
  pedido(id: ID!): Pedido
  contratos(id_cliente: ID): [Contrato]
  contrato(id: ID!): Contrato
  aditivosContrato(id_contrato: ID): [AditivoContrato]
  clienteProdutosContratados(id_cliente: ID): [ClienteProdutoContratado]
  faturas(id_contrato: ID): [Fatura]
  fatura(id: ID!): ClienteProdutoContratado
  implantacoes(id_contrato: ID): [Implantacao]
  implantacao(id: ID!): Implantacao
  comissoes(id_pedido: ID): [Comissao]
  
  # Mensageria/CPM
  mensagemCategorias: [MensagemCategoria]
  campanhasMensagem: [MensagemCampanha]
  campanhaMensagem(id: ID!): MensagemCampanha
  enviosMensagem(id_campanha: ID): [MensagemEnvio]
  notificacoesInternas(id_colaborador: ID): [NotificacaoInterna]
  scriptsMensagem: [MensagemScriptRegra]
  regrasAutomacao: [AutomacaoRegra]
  tarefas(id_responsavel: ID): [Tarefa]
  
  status(tipo_entidade: String): [Status]
}

# Mutations - CRUD for all major tables
type ParametrosEmpresa {
  id_parametro: ID!
  nome_parametro: String
  valor_parametro: String
  tipo_parametro: String
  descricao: String
}

type Permissao {
  id_permissao: ID!
  nome_perfil: String!
  nivel_acesso: Int!
  ativo: Boolean!
}

type DepartamentoLegacy {
  id_departamento: ID!
  nome: String!
  descricao: String
  codigo: String
  ativo: Boolean!
  data_criacao: DateTime!
  empresa_nome: String
}

type Mutation {
  # Legacy mutations
  createEmpresa(input: CreateEmpresaInput!): Empresa
  updateEmpresa(id: ID!, input: UpdateEmpresaInput!): Empresa
  # createColaborador(input: CreateColaboradorInputLegacy!): Colaborador  # REMOVED DUPLICATE
  # updateColaborador(id: ID!, input: UpdateColaboradorInputLegacy!): Colaborador  # REMOVED DUPLICATE
  updateParametrosEmpresa(input: UpdateParametrosEmpresaInput!): ParametrosEmpresa
  
  # Organizational CRUD
  createFilial(input: CreateFilialInput!): Filial
  updateFilial(id: ID!, input: UpdateFilialInput!): Filial
  deleteFilial(id: ID!): Boolean
  
  createDepartamento(input: CreateDepartamentoInput!): Departamento
  createColaborador(input: CreateColaboradorInput!): Colaborador
  updateColaborador(id: ID!, input: UpdateColaboradorInput!): Colaborador
  
  # CRM CRUD
  createLead(input: CreateLeadInput!): Lead
  updateLead(id: ID!, input: UpdateLeadInput!): Lead
  classificarLead(id_lead: ID!, cep: String!): Lead
  
  createCliente(input: CreateClienteInput!): Cliente
  updateCliente(id: ID!, input: UpdateClienteInput!): Cliente
  
  createOrcamento(input: CreateOrcamentoInput!): Orcamento
  createPedido(input: CreatePedidoInput!): Pedido
  createContrato(input: CreateContratoInput!): Contrato
  createAditivoContrato(input: CreateAditivoContratoInput!): AditivoContrato
  
  createFatura(input: CreateFaturaInput!): Fatura
  pagarFatura(id: ID!, valor_pago: Float!): Fatura
  
  createImplantacao(input: CreateImplantacaoInput!): Implantacao
  
  # Mensageria/CPM
  createCampanhaMensagem(input: CreateCampanhaMensagemInput!): MensagemCampanha
  updateCampanhaMensagem(id: ID!, input: UpdateCampanhaMensagemInput!): MensagemCampanha
  triggerEnvioManual(id_campanha: ID!): MensagemEnvio
  
  createTarefa(input: CreateTarefaInput!): Tarefa
  updateTarefaStatus(id: ID!, status_id: ID!): Tarefa
  login(input: LoginInput!): AuthPayload
}

