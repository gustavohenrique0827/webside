version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:3000"
    environment:
      - VITE_API_URL=http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - webside-prod

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=mysql://root:password@mysql:3306/webside_crm
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - webside-prod

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: webside_crm
    volumes:
      - mysql_prod:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - webside-prod

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_prod:/data
    restart: unless-stopped
    networks:
      - webside-prod

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - webside-prod

volumes:
  mysql_prod:
  redis_prod:

networks:
  webside-prod:
    driver: bridge

