version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - webside-net

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=mysql://root:password@mysql:3306/webside_crm
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mysql
      - redis
    networks:
      - webside-net

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: webside_crm
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - webside-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - webside-net

volumes:
  mysql_data:
  redis_data:

networks:
  webside-net:
    driver: bridge

# Run: docker compose up -d
# Frontend: http://localhost:8081
# Backend API: http://localhost:3001

