version: '3.8'

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        - VITE_API_URL=http://backend:5000
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - webside-network
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_HOST=162.241.2.103
      - DB_USER=websid23_dev
      - DB_PASSWORD=Web@132435*
      - DB_NAME=websid23_erp
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - webside-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=websid23_erp
      - MYSQL_USER=websid23_dev
      - MYSQL_PASSWORD=Web@132435*
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/migrations:/docker-entrypoint-initdb.d/migrations
      - ../database/seeds:/docker-entrypoint-initdb.d/seeds
    networks:
      - webside-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - webside-network
    restart: unless-stopped

networks:
  webside-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local

